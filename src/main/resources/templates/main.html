<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DineOut</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{header :: main-header}"></div>

<div class="category-section-wrapper">
    <div class="category-container">
        <div class="category-cards">
            <img src="/images/categories/allaKategorier.png" alt="ALLA KATEGORIER">
            <span>Alla kategorier</span>
        </div>
        <div class="category-cards" th:each="cat : ${categories}">
            <img th:src="@{'/images/categories/' + ${cat.toString().toLowerCase()} + '.png'}" th:alt="${cat}">
            <span th:text="${cat}">Kategori</span>
        </div>
    </div>
</div>

<div class="restaurant-grid">
    <div class="restaurant-cards" th:each="res : ${restaurants}" th:data-city="${res.address.city}" th:data-category="${res.category}">
        <img th:src="@{${res.imagePath}}" loading="lazy" alt="Restaurangbild">
        <div th:class="restaurant-card-info">
            <span th:text="${res.name}">Namn</span>
            <span class="restaurant-card-rating" th:text="${res.rating}">Betyg</span>
        </div>
    </div>
</div>

<script src="/js/script.js"></script>
</body>
</html>
