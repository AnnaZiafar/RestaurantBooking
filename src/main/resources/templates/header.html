<header th:fragment="main-header">
    <a class="logo" href="/">
        <h1 class="dine">Dine</h1>
        <h1 class="out">Out</h1>
        <img src="/images/logo.png" alt="LOGO">
    </a>

    <div class="search-wrapper">
        <div class="city-container">
            <div class="city-selection">Alla städer</div>
            <div class="city-options">
                <div>Göteborg</div>
                <div>Stockholm</div>
                <div>Malmö</div>
            </div>
        </div>

        <form id="search-container" class="restaurant-search-container">
            <span class="search-icon"></span>
            <input type="text"
                   id="restaurant-search-input"
                   placeholder="Sök efter kategori eller restaurang..."
                   class="restaurant-search">
            <button id="search-button">SÖK</button>
        </form>
    </div>

    <button class="log-in-button">
        <img src="/images/log-in.png" alt="">
        <span class="text">LOGGA IN</span>
    </button>
</header>
